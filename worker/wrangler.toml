name = "watch-together-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# All routes are under /watch-together/* — see src/index.js for the router.

[vars]
FIREBASE_DATABASE_URL = "https://auto-playback-default-rtdb.firebaseio.com"

# Rate limiting + kill-switch storage.
[[kv_namespaces]]
binding = "WATCH_TOGETHER_KV"
id = "19709e2fbeac43cdae2461b2b7335b45"
preview_id = "ee1dc5a7dee94f299c4fbbe323a53891"

# Hourly cleanup of stale rooms (state/updatedAt older than 24h).
# Requires a Firebase RTDB `.indexOn: ["state/updatedAt"]` rule declared at the
# /rooms level itself — see firebase-security-rules.json and src/cron.js.
[triggers]
crons = ["0 * * * *"]

# Secret (NOT set here — set via `wrangler secret put FIREBASE_SERVICE_ACCOUNT_KEY`):
#   FIREBASE_SERVICE_ACCOUNT_KEY = the full JSON contents of a Google service
#   account key for the target Firebase project, as a single-line string.
