name = "watch-together-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# All routes are under /watch-together/* — see src/index.js for the router.

[vars]
# Placeholder — the real Firebase project doesn't exist yet. The developer must
# replace this with their real Realtime Database URL once they've set up the
# shared Firebase project (see README.md's "Watch Together backend setup" section).
FIREBASE_DATABASE_URL = "https://REPLACE-ME-default-rtdb.firebaseio.com"

# Rate limiting + kill-switch storage. Create with:
#   npx wrangler kv namespace create WATCH_TOGETHER_KV
# then paste the returned id below (and add a second block with preview_id for
# `wrangler dev`, from `npx wrangler kv namespace create WATCH_TOGETHER_KV --preview`).
[[kv_namespaces]]
binding = "WATCH_TOGETHER_KV"
id = "REPLACE_ME_KV_NAMESPACE_ID"
preview_id = "REPLACE_ME_KV_PREVIEW_NAMESPACE_ID"

# Hourly cleanup of stale rooms (state/updatedAt older than 24h).
# Requires a Firebase RTDB `.indexOn: ["state/updatedAt"]` rule declared at the
# /rooms level itself — see firebase-security-rules.json and src/cron.js.
[triggers]
crons = ["0 * * * *"]

# Secret (NOT set here — set via `wrangler secret put FIREBASE_SERVICE_ACCOUNT_KEY`):
#   FIREBASE_SERVICE_ACCOUNT_KEY = the full JSON contents of a Google service
#   account key for the target Firebase project, as a single-line string.
