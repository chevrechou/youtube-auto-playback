<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>YouTube Auto-Playback</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1a1a1a;
    background: #ffffff;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid #e5e5e5;
  }
  .icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .title {
    font-size: 14px;
    font-weight: 600;
  }
  .error {
    padding: 12px 14px;
    font-size: 13px;
    color: #b3261e;
  }
  .rows.loading .row-label,
  .rows.loading .row-desc {
    opacity: 0.5;
  }
  .row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 12px 14px;
    gap: 12px;
  }
  .row + .row {
    border-top: 1px solid #f0f0f0;
  }
  .row-text {
    flex: 1;
  }
  .row-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    cursor: pointer;
  }
  .row-desc {
    font-size: 13px;
    color: #5f5f5f;
    line-height: 1.4;
  }
  .switch-input {
    appearance: none;
    -webkit-appearance: none;
    position: relative;
    width: 36px;
    height: 20px;
    margin-top: 1px;
    border-radius: 9999px;
    background: #c7c7c7;
    flex-shrink: 0;
    cursor: pointer;
    transition: background 0.15s ease-out;
  }
  .switch-input::before {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    transition: left 0.15s ease-out;
  }
  .switch-input:checked {
    background: #2e7d32;
  }
  .switch-input:checked::before {
    left: 18px;
  }
  .switch-input:disabled {
    opacity: 0.5;
    cursor: default;
  }
  .switch-input:focus-visible {
    outline: 2px solid #cc0000;
    outline-offset: 2px;
  }
  .footer {
    padding: 8px 14px 10px;
    font-size: 11px;
    color: #5f5f5f;
    text-align: center;
    border-top: 1px solid #f0f0f0;
  }
</style>
</head>
<body>
  <div class="header">
    <img class="icon" src="icons/icon16.png" alt="">
    <div class="title">YouTube Auto-Playback</div>
  </div>
  <div id="error" class="error" hidden></div>
  <div id="rows" class="rows loading">
    <div class="row">
      <div class="row-text">
        <label class="row-label" for="enabled-switch">Auto-Playback</label>
        <div class="row-desc">Resumes paused videos, loops when they end, dismisses "still watching?" prompts.</div>
      </div>
      <input type="checkbox" role="switch" id="enabled-switch" class="switch-input" disabled>
    </div>
    <div class="row">
      <div class="row-text">
        <label class="row-label" for="zen-switch">Zen Mode</label>
        <div class="row-desc">Hides comments, recommendations, and end-screen suggestions on watch pages.</div>
      </div>
      <input type="checkbox" role="switch" id="zen-switch" class="switch-input" disabled>
    </div>
  </div>
  <div class="footer" id="footer"></div>
  <script src="popup.js"></script>
</body>
</html>
